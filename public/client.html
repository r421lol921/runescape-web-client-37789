<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>PeytOtoria - Game Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #f0ede8;
            overflow: hidden;
        }
        
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }
        
        .loading-container {
            text-align: center;
            padding: 2rem;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #3a3a3a;
            border-top: 4px solid #c8a96e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            margin-bottom: 0.5rem;
            color: #f0ede8;
            font-weight: 500;
        }
        
        .loading-subtext {
            font-size: 14px;
            color: #8a8480;
        }
        
        .loading-status {
            font-size: 12px;
            color: #c8a96e;
            margin-top: 1rem;
            font-style: italic;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
  <div id="root">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">PeytOtoria</div>
      <div class="loading-subtext">Initializing game client...</div>
      <div class="loading-status">This may take a moment</div>
    </div>
  </div>
  
  <script>
    (function initGame() {
      // Create game canvas
      const canvas = document.createElement('canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.id = 'game-canvas';
      
      const root = document.getElementById('root');
      const loadingContainer = root.querySelector('.loading-container');
      
      // Wait a moment to show loading, then display canvas
      setTimeout(() => {
        if (loadingContainer) {
          loadingContainer.style.display = 'none';
        }
        root.appendChild(canvas);
        
        // Initialize basic game rendering context
        const ctx = canvas.getContext('2d');
        
        // Draw game border/frame
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#c8a96e';
        ctx.lineWidth = 2;
        ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
        
        // Draw title bar
        ctx.fillStyle = '#242424';
        ctx.fillRect(0, 0, canvas.width, 40);
        
        ctx.fillStyle = '#c8a96e';
        ctx.font = 'bold 14px Roboto, sans-serif';
        ctx.fillText('PeytOtoria - Game World', 16, 25);
        
        // Draw game area message
        ctx.fillStyle = '#8a8480';
        ctx.font = '12px Roboto, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Engine Ready - Welcome to PeytOtoria', canvas.width / 2, canvas.height / 2);
        
        // Handle window resize
        window.addEventListener('resize', () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          
          // Redraw on resize
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          ctx.strokeStyle = '#c8a96e';
          ctx.lineWidth = 2;
          ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
          
          ctx.fillStyle = '#242424';
          ctx.fillRect(0, 0, canvas.width, 40);
          
          ctx.fillStyle = '#c8a96e';
          ctx.font = 'bold 14px Roboto, sans-serif';
          ctx.fillText('PeytOtoria - Game World', 16, 25);
          
          ctx.fillStyle = '#8a8480';
          ctx.font = '12px Roboto, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Game Engine Ready - Welcome to PeytOtoria', canvas.width / 2, canvas.height / 2);
        });
      }, 1500);
    })();
  </script>
</body>

</html>
