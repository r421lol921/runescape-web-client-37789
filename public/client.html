<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <title>PeytOtoria - Game Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Roboto, sans-serif;
            background: #1a1a1a;
            color: #f0ede8;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #root {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-container {
            text-align: center;
            padding: 2rem;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #3a3a3a;
            border-top: 4px solid #c8a96e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            margin-bottom: 0.5rem;
            color: #f0ede8;
        }
        
        .loading-subtext {
            font-size: 14px;
            color: #8a8480;
        }
        
        .loading-status {
            font-size: 12px;
            color: #c8a96e;
            margin-top: 1rem;
            font-style: italic;
        }
    </style>
</head>

<body>
  <div id="root">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">PeytOtoria Client</div>
      <div class="loading-subtext">Initializing game engine...</div>
      <div class="loading-status">This may take a few moments</div>
    </div>
  </div>
  
  <script src="./page/Main.tsx"></script>
</body>

</html>
